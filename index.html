<title>Maria · 18 Anni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0a0c;
    --ink-2:#141212;
    --card:#131110;
    --gold:#cda86e;
    --gold-bright:#f0d9a8;
    --gold-dim:#8a7148;
    --cream:#f4ecd8;
    --cream-2:#e9dcc0;
    --silver:#e7e7ec;
    --silver-dim:#9b9ba3;
    --shadow: 0 20px 60px rgba(0,0,0,.55);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100svh;
    background:var(--ink);
    color:var(--cream);
    font-family:'Bodoni Moda', serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Festive backdrop (user brand color) + fireworks ---------- */
  .glitter-bg{
    position:fixed; inset:0; z-index:0; overflow:hidden;
    background:
      radial-gradient(circle at 50% 0%, #3a0603 0%, transparent 55%),
      radial-gradient(circle at 15% 80%, #330301 0%, transparent 50%),
      linear-gradient(180deg, #2c0100 0%, #270001 55%, #1c0100 100%);
  }
  .glitter-bg::after{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.6) 100%);
  }
  .sparks{ position:absolute; inset:0; }
  .spark{
    position:absolute;
    width:2px; height:2px;
    background:#fff;
    border-radius:50%;
    box-shadow:0 0 6px 1px rgba(255,255,255,.9);
    animation: twinkle 2.6s ease-in-out infinite;
    opacity:0;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0; transform:scale(.4);}
    50%{ opacity:1; transform:scale(1.6);}
  }

  .fireworks{ position:absolute; inset:0; overflow:hidden; }
  .fw-particle{
    position:absolute;
    top:0; left:0;
    width:5px; height:5px;
    border-radius:50%;
    background:var(--fw-c, #f0d9a8);
    box-shadow:0 0 8px 1px var(--fw-c, #f0d9a8);
    animation: fw-launch 1.15s cubic-bezier(.15,.7,.3,1) forwards;
    opacity:0;
  }
  @keyframes fw-launch{
    0%{ transform:translate(0,0) scale(1); opacity:1; }
    75%{ opacity:1; }
    100%{ transform:translate(var(--dx), var(--dy)) scale(.15); opacity:0; }
  }
  .fw-flash{
    position:absolute; top:0; left:0;
    width:10px; height:10px; margin:-5px 0 0 -5px;
    border-radius:50%;
    background: radial-gradient(circle, #fff 0%, var(--fw-c, #f0d9a8) 45%, transparent 75%);
    animation: fw-flash .5s ease-out forwards;
  }
  @keyframes fw-flash{
    0%{ transform:scale(0); opacity:1; }
    100%{ transform:scale(5.5); opacity:0; }
  }

  /* ---------- App shell ---------- */
  .stage{
    position:relative; z-index:1;
    min-height:100svh;
    display:flex; align-items:center; justify-content:center;
    padding:7vh 8vw;
  }
  .page{
    width:100%; max-width:420px;
    display:none;
    flex-direction:column; align-items:center;
    text-align:center;
  }
  .page.active{ display:flex; }

  .eyebrow{
    font-family:'Bodoni Moda', serif;
    letter-spacing:.35em;
    text-transform:uppercase;
    font-size:.72rem;
    color:var(--gold);
    opacity:.85;
    margin:0 0 1.6rem;
  }

  /* ---------- PAGE 1 — Envelope ---------- */
  .envelope-wrap{
    perspective:1400px;
    width:min(78vw, 300px);
    aspect-ratio: 4 / 2.7;
    margin-top:1rem;
    filter:drop-shadow(var(--shadow));
  }
  .envelope{
    position:relative;
    width:100%; height:100%;
    animation: floaty 5s ease-in-out infinite;
    transform-style: preserve-3d;
  }
  @keyframes floaty{
    0%,100%{ transform:translateY(0px); }
    50%{ transform:translateY(-8px); }
  }
  .env-body{
    position:absolute; inset:0;
    background:linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
    border-radius:6px;
  }
  .env-flap{
    position:absolute; left:0; top:0; width:100%; height:62%;
    background:linear-gradient(160deg, var(--cream-2), var(--cream));
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 1s cubic-bezier(.6,-0.2,.3,1.3);
    border-radius:6px 6px 0 0;
  }
  .env-shadow-fold{
    position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 60%, rgba(0,0,0,.08) 100%);
    border-radius:6px;
    z-index:1;
    pointer-events:none;
  }
  .seal-anchor{
    position:absolute; left:0; top:0; width:100%; height:62%;
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 1s cubic-bezier(.6,-0.2,.3,1.3);
    pointer-events:none;
  }
  .envelope.opened .seal-anchor{
    transform: rotateX(180deg);
  }
  .seal{
    position:absolute; left:50%; top:97%;
    width:67px; height:auto;
    transform:translate(-50%,-50%);
    display:block;
    cursor:pointer;
    pointer-events:auto;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,.55));
    transition: transform .25s ease;
  }
  .seal:active{ transform:translate(-50%,-50%) scale(.92); }
  .envelope.opened .env-flap{
    transform: rotateX(180deg);
  }
  .tap-hint{
    margin-top:1.8rem;
    font-family:'Pinyon Script', cursive;
    font-size:clamp(1.9rem, 7.5vw, 2.3rem);
    letter-spacing:normal;
    text-transform:none;
    color:var(--gold-bright);
  }
  .tap-hint .amp{ color:var(--gold); }

  /* ---------- PAGE 2 — Invite ---------- */
  .numeral{
    font-family:'Bodoni Moda', serif;
    font-weight:400;
    font-size:clamp(3.4rem, 15vw, 4.6rem);
    line-height:.85;
    background: linear-gradient(180deg, #fff 0%, var(--gold-bright) 35%, var(--gold) 60%, var(--gold-dim) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter: drop-shadow(0 2px 10px rgba(205,168,110,.35));
    letter-spacing:normal;
    animation: rise .9s ease both;
  }
  .name{
    font-family:'Pinyon Script', cursive;
    font-size:clamp(4.6rem, 20vw, 6rem);
    color:var(--cream);
    margin:-.4rem 0 1.1rem;
    text-shadow: 0 0 18px rgba(244,236,216,.35);
    animation: rise .9s .1s ease both;
  }
  .invite-line{
    font-size:1.05rem;
    letter-spacing:.04em;
    color:var(--silver-dim);
    margin:.15rem 0;
    animation: rise .9s .18s ease both;
  }
  .invite-date{
    font-family:'Bodoni Moda', serif;
    font-weight:400;
    font-size:1.5rem;
    color:var(--cream);
    margin:.2rem 0 .1rem;
    animation: rise .9s .22s ease both;
  }
  .invite-time{
    font-family:'Bodoni Moda', serif;
    font-size:1rem;
    letter-spacing:.28em;
    color:var(--gold);
    margin-bottom:2.4rem;
    animation: rise .9s .26s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .actions{
    display:flex; gap:2.6rem;
    margin-bottom:2.2rem;
    animation: rise .9s .32s ease both;
  }
  .action{
    display:flex; flex-direction:column; align-items:center; gap:.55rem;
    background:none; border:none; cursor:pointer;
    color:inherit; text-decoration:none;
    font-family:'Bodoni Moda', serif;
  }
  .action-icon{
    width:56px; height:56px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 35% 30%, #4a3c22, #241d10 75%);
    border:1px solid rgba(205,168,110,.5);
    box-shadow: 0 8px 20px rgba(0,0,0,.5), inset 0 0 12px rgba(205,168,110,.15);
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .action:hover .action-icon, .action:active .action-icon{
    transform: translateY(-3px);
    box-shadow: 0 12px 24px rgba(0,0,0,.55), 0 0 0 1px var(--gold);
  }
  .action-icon svg{ width:24px; height:24px; stroke:var(--gold-bright); }
  .action-label{
    font-size:.78rem;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--silver-dim);
  }

  .confirm-btn{
    display:inline-flex; align-items:center; gap:.5rem;
    padding:.62rem 1.4rem;
    margin-bottom:1.8rem;
    border:1px solid var(--gold);
    border-radius:999px;
    background: rgba(205,168,110,.08);
    color:var(--gold-bright);
    text-decoration:none;
    font-family:'Bodoni Moda', serif;
    font-size:.8rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
    animation: rise .9s .36s ease both;
  }
  .confirm-btn svg{ flex-shrink:0; color:var(--gold-bright); width:1.3em; height:1.3em; }
  .confirm-btn:hover, .confirm-btn:active{
    transform:translateY(-2px);
    background: rgba(205,168,110,.16);
    box-shadow: 0 8px 20px rgba(0,0,0,.4);
  }

  .rsvp{
    font-family:'Pinyon Script', cursive;
    font-size:2.3rem;
    color:var(--gold-bright);
    position:relative;
    animation: rise .9s .4s ease both;
  }

  /* ---------- PAGE 3 — Dress code ---------- */
  .dc-numeral{ margin-bottom:-.2rem; }
  .dc-name{ margin-bottom:1.6rem; }
  .back-btn{
    position:absolute;
    top:22px; left:22px;
    z-index:5;
    width:38px; height:38px;
    border-radius:50%;
    border:1px solid rgba(205,168,110,.4);
    background:rgba(20,18,17,.6);
    color:var(--gold-bright);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .dc-title{
    font-family:'Bodoni Moda', serif;
    font-weight:400;
    font-size:clamp(2.1rem,8vw,2.6rem);
    letter-spacing:.14em;
    background: linear-gradient(180deg, #fff, var(--gold) 70%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:.4rem;
  }
  .dc-sub{
    font-size:1rem;
    color:var(--silver-dim);
    letter-spacing:.06em;
    margin-bottom:2.6rem;
  }
  .dc-row{
    display:flex; gap:2.4rem; justify-content:center;
    margin-bottom:2.2rem;
  }
  .dc-item{ display:flex; flex-direction:column; align-items:center; gap:.9rem; width:120px; }
  .dc-icon svg{ width:74px; height:110px; stroke:var(--gold-bright); fill:none; stroke-width:1.4; }
  .dc-item p{
    margin:0;
    font-size:.85rem;
    letter-spacing:.05em;
    color:var(--cream);
  }
  .dc-item span{
    display:block;
    font-family:'Bodoni Moda', serif;
    font-size:1rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:.15rem;
  }
  .dc-note{
    font-family:'Pinyon Script', cursive;
    font-size:1.5rem;
    color:var(--silver);
    opacity:.9;
  }

  footer.credit{
    position:relative; z-index:1;
    text-align:center;
    font-size:.68rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:#4a4a4f;
    padding-bottom:1.4rem;
  }
</style>
</head>

<script>
  // Generate ambient sparkle dust
  const sparksHost = document.getElementById('sparks');
  const N = 55;
  for(let i=0;i<N;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3).toFixed(2)+'s';
    s.style.animationDuration = (1.8+Math.random()*2.2).toFixed(2)+'s';
    sparksHost.appendChild(s);
  }

  // Festive fireworks bursts
  const fwHost = document.getElementById('fireworks');
  const fwColors = ['#ffffff', '#ffffff', '#f5f5f5', '#ffffff'];
  function spawnFirework(){
    const xPct = 8 + Math.random()*84;
    const yPct = 8 + Math.random()*46;
    const color = fwColors[Math.floor(Math.random()*fwColors.length)];
    const count = 18 + Math.floor(Math.random()*8);
    const radius = 55 + Math.random()*70;

    const flash = document.createElement('div');
    flash.className = 'fw-flash';
    flash.style.left = xPct+'%';
    flash.style.top = yPct+'%';
    flash.style.setProperty('--fw-c', color);
    fwHost.appendChild(flash);
    setTimeout(()=>flash.remove(), 550);

    for(let i=0;i<count;i++){
      const angle = (Math.PI*2*i/count) + (Math.random()*0.3);
      const dist = radius * (0.7 + Math.random()*0.5);
      const dx = Math.cos(angle)*dist + 'px';
      const dy = Math.sin(angle)*dist*0.85 + 'px';
      const p = document.createElement('div');
      p.className = 'fw-particle';
      p.style.left = xPct+'%';
      p.style.top = yPct+'%';
      p.style.setProperty('--dx', dx);
      p.style.setProperty('--dy', dy);
      p.style.setProperty('--fw-c', color);
      p.style.animationDelay = (Math.random()*0.08)+'s';
      fwHost.appendChild(p);
      setTimeout(()=>p.remove(), 1400);
    }
  }
  spawnFirework();
  setTimeout(spawnFirework, 500);
  setInterval(()=> spawnFirework(), 1400 + Math.random()*600);

  function goTo(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  const envelope = document.getElementById('envelope');
  const seal = document.getElementById('seal');

  seal.addEventListener('click', () => {
    envelope.classList.add('opened');
    setTimeout(()=>{ goTo('page-invite'); }, 900);
  });

  document.getElementById('toDressCode').addEventListener('click', () => {
    goTo('page-dresscode');
  });
  document.getElementById('backBtn').addEventListener('click', () => {
    goTo('page-invite');
  });
</script>
